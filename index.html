<!DOCTYPE html>
<html>
<head>
    <title>Chat Online</title>
</head>
<body>

<h2>Login / Registro</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Login</button>
<button onclick="register()">Registrar</button>

<hr>

<h3>Usuários Online</h3>
<ul id="lista"></ul>

<h3>Chat</h3>
<div id="chat" style="height:200px; overflow-y:auto; border:1px solid black;"></div>

<input id="msg" placeholder="Digite mensagem">
<button onclick="enviar()">Enviar</button>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
let socket;

// conecta ao servidor
function conectar() {
    socket = io("https://ladybug-radio-unfrosted.ngrok-free.dev", {
        transports: ["websocket"]
    });

    socket.on("erro", msg => alert(msg));
    socket.on("sucesso", msg => alert(msg));

    socket.on("usuarios", users => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";
        users.forEach(u => {
            lista.innerHTML += `<li>${u}</li>`;
        });
    });

    socket.on("mensagem", data => {
        const chat = document.getElementById("chat");
        chat.innerHTML += `<p><b>${data.user}:</b> ${data.msg}</p>`;
        chat.scrollTop = chat.scrollHeight;
    });
}

// login
function login() {
    const username = document.getElementById("user").value.trim();
    const password = document.getElementById("pass").value.trim();

    if (!username || !password) {
        alert("Preencha tudo");
        return;
    }

    conectar();
    socket.emit("login", {username, password});
}

// registro
function register() {
    const username = document.getElementById("user").value.trim();
    const password = document.getElementById("pass").value.trim();

    if (!username || !password) {
        alert("Preencha tudo");
        return;
    }

    conectar();
    socket.emit("register", {username, password});
}

// enviar mensagem
function enviar() {
    const input = document.getElementById("msg");
    const msg = input.value.trim();

    if (!msg) return;

    socket.emit("mensagem", {msg});
    input.value = "";
}

// enviar com ENTER
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        enviar();
    }
});
</script>

</body>
</html>
