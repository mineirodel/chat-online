<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Online PRO</title>
<style>
body { margin:0; font-family: Arial; background:#0f172a; color:white; display:flex; height:100vh; }
.sidebar { width:250px; background:#1e293b; padding:15px; }
.chat-list li { padding:10px; background:#334155; margin-bottom:10px; cursor:pointer; border-radius:8px; }
.main { flex:1; display:flex; flex-direction:column; }
.messages { flex:1; padding:20px; overflow-y:auto; }
.input-area { display:flex; padding:10px; background:#1e293b; }
input { flex:1; padding:10px; border-radius:8px; border:none; margin:5px; }
button { padding:10px; border:none; border-radius:8px; background:#3b82f6; color:white; cursor:pointer; }
#auth { position:absolute; top:20px; right:20px; background:#1e293b; padding:10px; border-radius:10px; }
</style>
</head>
<body>

<div id="auth">
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="register()">Registrar</button>
    <button onclick="login()">Login</button>
</div>

<div class="sidebar">
    <h2>Chats</h2>
    <ul class="chat-list">
        <li onclick="switchChat('global')">🌍 Global</li>
        <li onclick="switchChat('privado')">🔒 Privado</li>
    </ul>
</div>

<div class="main">
    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Digite sua mensagem...">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
let currentChat = 'global';
let chats = { global: [], privado: [] };
let loggedUser = null;

function switchChat(chat) {
    currentChat = chat;
    renderMessages();
}

function sendMessage() {
    if (!loggedUser) return alert('Faça login primeiro');

    let input = document.getElementById('msg');
    let text = input.value;
    if (text.trim() === '') return;

    chats[currentChat].push(`${loggedUser}: ${text}`);
    input.value = '';
    renderMessages();
}

function renderMessages() {
    let container = document.getElementById('messages');
    container.innerHTML = '';

    chats[currentChat].forEach(msg => {
        let div = document.createElement('div');
        div.textContent = msg;
        container.appendChild(div);
    });
}

async function register() {
    const username = document.getElementById('user').value;
    const password = document.getElementById('pass').value;

    await fetch('http://localhost:3000/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
    });

    alert('Registrado!');
}

async function login() {
    const username = document.getElementById('user').value;
    const password = document.getElementById('pass').value;

    const res = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
    });

    if (res.status === 200) {
        loggedUser = username;
        document.getElementById('auth').style.display = 'none';
        alert('Logado!');
    } else {
        alert('Erro no login');
    }
}
</script>

</body>
</html>
