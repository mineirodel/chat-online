<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Online (Simulado)</title>
<style>
body { margin:0; font-family: Arial; background:#0f172a; color:white; display:flex; height:100vh; }
.sidebar { width:260px; background:#1e293b; padding:15px; box-shadow: 4px 0 20px rgba(0,0,0,.3); }
.sidebar h2 { margin: 0 0 10px 0; }
.chat-list { list-style:none; padding:0; margin:0; }
.chat-list li { padding:10px; background:#334155; margin-bottom:10px; cursor:pointer; border-radius:10px; transition:.2s; }
.chat-list li:hover { background:#475569; transform: translateX(4px); }
.main { flex:1; display:flex; flex-direction:column; }
.header { padding:12px 16px; background:#020617; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between; align-items:center; }
.messages { flex:1; padding:20px; overflow-y:auto; }
.msg { margin-bottom:10px; padding:10px 12px; background:#020617; border-radius:10px; max-width:70%; }
.me { background:#1d4ed8; margin-left:auto; }
.input-area { display:flex; padding:10px; background:#1e293b; }
input { flex:1; padding:10px; border-radius:10px; border:none; margin-right:10px; outline:none; }
button { padding:10px 14px; border:none; border-radius:10px; background:#3b82f6; color:white; cursor:pointer; }
button:hover { background:#2563eb; }
#auth { position:absolute; inset:0; background:rgba(2,6,23,.9); display:flex; align-items:center; justify-content:center; }
.card { background:#1e293b; padding:20px; border-radius:16px; width:320px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
.card h3 { margin-top:0; }
.small { opacity:.7; font-size:12px; }
</style>
</head>
<body>

<!-- LOGIN SIMULADO -->
<div id="auth">
  <div class="card">
    <h3>Entrar</h3>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha (qualquer)">
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button onclick="register()">Registrar</button>
      <button onclick="login()">Login</button>
    </div>
    <p class="small">* Simulação: dados ficam no navegador (localStorage)</p>
  </div>
</div>

<div class="sidebar">
  <h2>Chats</h2>
  <ul class="chat-list">
    <li onclick="switchChat('global')">🌍 Global</li>
    <li onclick="switchChat('privado')">🔒 Privado</li>
  </ul>
</div>

<div class="main">
  <div class="header">
    <div id="roomName">🌍 Global</div>
    <div>
      <span id="who"></span>
      <button onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="msg" placeholder="Digite sua mensagem...">
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
// ====== Estado ======
let currentChat = 'global';
let loggedUser = null;

// Carrega do localStorage
let users = JSON.parse(localStorage.getItem('users') || '[]');
let chats = JSON.parse(localStorage.getItem('chats') || '{"global":[],"privado":[]}');

// ====== Auth (simulado) ======
function register(){
  const u = user.value.trim();
  const p = pass.value.trim();
  if(!u || !p) return alert('Preencha tudo');
  if(users.find(x=>x.username===u)) return alert('Usuário já existe');
  users.push({username:u, password:p});
  localStorage.setItem('users', JSON.stringify(users));
  alert('Registrado!');
}

function login(){
  const u = user.value.trim();
  const p = pass.value.trim();
  const ok = users.find(x=>x.username===u && x.password===p);
  if(!ok) return alert('Login inválido');
  loggedUser = u;
  localStorage.setItem('session', u);
  auth.style.display='none';
  who.textContent = '👤 ' + u;
  renderMessages();
}

function logout(){
  localStorage.removeItem('session');
  location.reload();
}

// ====== Chat ======
function switchChat(chat){
  currentChat = chat;
  roomName.textContent = chat==='global' ? '🌍 Global' : '🔒 Privado';
  renderMessages();
}

function sendMessage(){
  if(!loggedUser) return alert('Faça login');
  const t = msg.value.trim();
  if(!t) return;
  const payload = { user: loggedUser, text: t, ts: Date.now() };
  chats[currentChat].push(payload);
  localStorage.setItem('chats', JSON.stringify(chats));
  msg.value='';
  renderMessages();
}

function renderMessages(){
  messages.innerHTML='';
  (chats[currentChat]||[]).forEach(m=>{
    const d = document.createElement('div');
    d.className = 'msg' + (m.user===loggedUser ? ' me' : '');
    d.textContent = m.user + ': ' + m.text;
    messages.appendChild(d);
  });
  messages.scrollTop = messages.scrollHeight;
}

// ====== Boot ======
(function init(){
  const s = localStorage.getItem('session');
  if(s){
    loggedUser = s;
    auth.style.display='none';
    who.textContent = '👤 ' + s;
  }
  renderMessages();
})();
</script>

</body>
</html>
