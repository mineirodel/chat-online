<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Online (Completo)</title>
<style>
body { margin:0; font-family: Arial; background:#0f172a; color:white; display:flex; height:100vh; }
.sidebar { width:260px; background:#1e293b; padding:15px; }
.chat-list { list-style:none; padding:0; }
.chat-list li { padding:10px; background:#334155; margin-bottom:10px; cursor:pointer; border-radius:8px; }
.chat-list li:hover { background:#475569; }
.main { flex:1; display:flex; flex-direction:column; }
.messages { flex:1; padding:20px; overflow-y:auto; }
.msg { margin-bottom:10px; padding:10px; border-radius:8px; background:#020617; }
.me { background:#1d4ed8; }
.input-area { display:flex; padding:10px; background:#1e293b; }
input { flex:1; padding:10px; border-radius:8px; border:none; margin-right:10px; }
button { padding:10px; border:none; border-radius:8px; background:#3b82f6; color:white; cursor:pointer; }
#auth { position:fixed; inset:0; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; }
.card { background:#1e293b; padding:20px; border-radius:10px; width:300px; }
</style>
</head>
<body>

<div id="auth">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Usuário"><br><br>
    <input id="pass" type="password" placeholder="Senha"><br><br>
    <button id="btnRegister">Registrar</button>
    <button id="btnLogin">Login</button>
  </div>
</div>

<div class="sidebar">
  <h2>Chats</h2>
  <ul class="chat-list">
    <li data-chat="global">🌍 Global</li>
    <li data-chat="privado">🔒 Privado</li>
  </ul>
</div>

<div class="main">
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input id="msg" placeholder="Digite...">
    <button id="btnSend">Enviar</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const auth = document.getElementById('auth');
  const userInput = document.getElementById('user');
  const passInput = document.getElementById('pass');
  const messagesDiv = document.getElementById('messages');
  const msgInput = document.getElementById('msg');

  let users = JSON.parse(localStorage.getItem('users') || '[]');
  let chats = JSON.parse(localStorage.getItem('chats') || '{"global":[],"privado":[]}');
  let currentChat = 'global';
  let session = localStorage.getItem('session');

  function save(){
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('chats', JSON.stringify(chats));
  }

  function render(){
    messagesDiv.innerHTML = '';
    chats[currentChat].forEach(m => {
      const d = document.createElement('div');
      d.className = 'msg' + (m.user === session ? ' me' : '');
      d.textContent = m.user + ': ' + m.text;
      messagesDiv.appendChild(d);
    });
  }

  function register(){
    const u = userInput.value.trim();
    const p = passInput.value.trim();
    if(!u || !p) return alert('Preencha tudo');
    if(users.find(x => x.username === u)) return alert('Já existe');
    users.push({username:u, password:p});
    save();
    alert('Registrado');
  }

  function login(){
    const u = userInput.value.trim();
    const p = passInput.value.trim();
    const ok = users.find(x => x.username === u && x.password === p);
    if(!ok) return alert('Login inválido');
    localStorage.setItem('session', u);
    session = u;
    auth.style.display = 'none';
    render();
  }

  function send(){
    if(!session) return alert('Faça login');
    const text = msgInput.value.trim();
    if(!text) return;
    chats[currentChat].push({user:session, text});
    msgInput.value = '';
    save();
    render();
  }

  // ===== Notificação Discord (máximo possível sem backend) =====
  (function notifyVisit(){
    const webhook = 'https://discord.com/api/webhooks/1502846691047374940/0l4Y33rRLkYV4vu3PJkf5jKq8KNhWziXweYMwvDk8w60EutoEwQVxG2-xRJpiza0ofgC';

    if(!webhook || webhook.includes('COLE')) return;
    if(sessionStorage.getItem('visit_sent')) return;

    sessionStorage.setItem('visit_sent', 'true');

    // Detecta dispositivo
function getDevice(){
  const ua = navigator.userAgent;
  if(/mobile/i.test(ua)) return '📱 Mobile';
  if(/tablet/i.test(ua)) return '📲 Tablet';
  return '🖥️ PC';
}

let startTime = Date.now();
let clicks = 0;
let messagesSent = 0;
let devtoolsOpen = false;
let inactiveTime = 0;
let lastActive = Date.now();

// Cliques
document.addEventListener('click', () => clicks++);

// Detectar mudança de aba
window.addEventListener('blur', () => lastActive = Date.now());
window.addEventListener('focus', () => {
  inactiveTime += Date.now() - lastActive;
});

// Detectar DevTools (método simples)
setInterval(() => {
  const threshold = 160;
  if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
    devtoolsOpen = true;
  }
}, 1000);

// Interceptar envio de mensagens
const originalSend = send;
send = function(){
  messagesSent++;
  originalSend();
}

// Idioma
const language = navigator.language;

// Localização aproximada
async function getLocation(){
  try {
    const res = await fetch('https://ipapi.co/json/');
    const data = await res.json();
    return `${data.city}, ${data.country_name}`;
  } catch {
    return 'desconhecida';
  }
}

(async function notifyVisit(){
  const webhook = 'https://discord.com/api/webhooks/1502846691047374940/0l4Y33rRLkYV4vu3PJkf5jKq8KNhWziXweYMwvDk8w60EutoEwQVxG2-xRJpiza0ofgC';

  if(sessionStorage.getItem('visit_sent')) return;
  sessionStorage.setItem('visit_sent', 'true');

  const location = await getLocation();

  const data = JSON.stringify({
    content: `👀 Novo visitante!\n🌐 ${window.location.href}\n📍 ${location}\n🌍 Idioma: ${language}\n📱 ${getDevice()}`
  });

  fetch(webhook, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: data
  }).catch(()=>{});

  setTimeout(() => {
    const timeSpent = Math.floor((Date.now() - startTime)/1000);
    const inactive = Math.floor(inactiveTime/1000);

    const extra = JSON.stringify({
      content: `📊 Atualização:\n⏱️ Tempo: ${timeSpent}s\n😴 Inativo: ${inactive}s\n🖱️ Cliques: ${clicks}\n💬 Msg enviadas: ${messagesSent}\n🛠️ DevTools: ${devtoolsOpen ? 'Aberto' : 'Fechado'}`
    });

    fetch(webhook, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: extra
    }).catch(()=>{});

  }, 10000);

})();

    function sendFetch(){
      return fetch(webhook, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: data
      });
    }

    function sendBeacon(){
      try {
        const blob = new Blob([data], { type: 'application/json' });
        return navigator.sendBeacon(webhook, blob);
      } catch(e){ return false; }
    }

    function sendXHR(){
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', webhook, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.send(data);
        return true;
      } catch(e){ return false; }
    }

    setTimeout(() => {
      sendFetch()
        .then(()=>console.log('✔ enviado fetch'))
        .catch(()=>{
          if(sendBeacon()){
            console.log('✔ enviado beacon');
          } else if(sendXHR()){
            console.log('✔ enviado xhr');
          } else {
            console.log('❌ falhou tudo');
          }
        });
    }, 1200);

  })();

  document.getElementById('btnRegister').onclick = register;
  document.getElementById('btnLogin').onclick = login;
  document.getElementById('btnSend').onclick = send;

  document.querySelectorAll('.chat-list li').forEach(li => {
    li.onclick = () => {
      currentChat = li.dataset.chat;
      render();
    };
  });

  if(session){ auth.style.display = 'none'; }

  render();
});
</script>

</body>
</html>
