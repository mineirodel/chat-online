<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Online</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 250px;
    background: #1e293b;
    padding: 15px;
}

.sidebar h2 {
    margin-top: 0;
}

.chat-list {
    list-style: none;
    padding: 0;
}

.chat-list li {
    padding: 10px;
    background: #334155;
    margin-bottom: 10px;
    cursor: pointer;
    border-radius: 8px;
}

.chat-list li:hover {
    background: #475569;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    margin-bottom: 10px;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Chats</h2>
    <ul class="chat-list">
        <li onclick="switchChat('global')">🌍 Global</li>
        <li onclick="switchChat('privado')">🔒 Privado</li>
    </ul>
</div>

<div class="main">
    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Digite sua mensagem...">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
let currentChat = 'global';
let chats = {
    global: [],
    privado: []
};

function switchChat(chat) {
    currentChat = chat;
    renderMessages();
}

function sendMessage() {
    let input = document.getElementById('msg');
    let text = input.value;

    if (text.trim() === '') return;

    chats[currentChat].push(text);
    input.value = '';

    renderMessages();
}

function renderMessages() {
    let container = document.getElementById('messages');
    container.innerHTML = '';

    chats[currentChat].forEach(msg => {
        let div = document.createElement('div');
        div.className = 'message';
        div.innerText = msg;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
